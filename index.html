<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LD Majšperk" />
  <title>LD Majšperk - Lovišče</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a2e1a;
      --surface: #1f3a1f;
      --surface2: #2d5016;
      --accent: #6aab3a;
      --accent2: #4a7c2f;
      --amber: #f5a623;
      --red: #e74c3c;
      --text: #f5f0e8;
      --text-dim: #8aab6a;
      --border: rgba(106,171,58,0.35);
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    #header {
      background: var(--surface);
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      flex-shrink: 0;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #header-icon {
      font-size: 28px;
      line-height: 1;
    }

    #header-text h1 {
      font-size: 12px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #header-text p {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
      letter-spacing: 0.5px;
      font-family: 'Georgia', serif;
      font-style: italic;
    }

    #status-badge {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }

    #gps-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-dim);
    }

    #gps-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    #gps-dot.active { background: var(--accent); animation: pulse 2s infinite; }
    #gps-dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }

    #boundary-status {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    #boundary-status.inside {
      background: rgba(46,204,113,0.15);
      color: var(--accent);
      border: 1px solid rgba(46,204,113,0.4);
    }

    #boundary-status.outside {
      background: rgba(231,76,60,0.2);
      color: #ff6b6b;
      border: 1px solid rgba(231,76,60,0.5);
      animation: blink 0.8s infinite;
    }

    #boundary-status.unknown {
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
      border: 1px solid rgba(255,255,255,0.1);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* MAP */
    #map {
      flex: 1;
      width: 100%;
      z-index: 1;
    }

    /* BOTTOM BAR */
    #bottom-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 1000;
    }

    .info-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 58px;
    }

    .info-label {
      font-size: 8px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-value {
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
    }

    /* CENTER BUTTON */
    #btn-center, #btn-map-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    #btn-center:active, #btn-map-toggle:active {
      background: var(--accent2);
      transform: scale(0.93);
    }

    /* ALERT OVERLAY */
    #alert-overlay {
      position: fixed;
      inset: 0;
      background: rgba(231, 76, 60, 0.96);
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
    }

    #alert-overlay.show { display: flex; }

    #alert-overlay .alert-icon { font-size: 72px; }
    #alert-overlay h2 { font-size: 26px; text-align: center; font-weight: 700; }
    #alert-overlay p { font-size: 15px; text-align: center; opacity: 0.85; }

    #btn-dismiss {
      margin-top: 16px;
      background: white;
      color: var(--red);
      border: none;
      padding: 14px 36px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* LOADING */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #loading .load-icon { font-size: 64px; animation: sway 1.5s ease-in-out infinite; }

    @keyframes sway {
      0%, 100% { transform: rotate(-8deg) scale(1); }
      50% { transform: rotate(8deg) scale(1.05); }
    }

    #loading h2 { font-size: 18px; color: var(--amber); font-weight: 700; letter-spacing: 1px; }
    #loading p { font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; }

    .load-bar {
      width: 180px;
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .load-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      animation: load 1.8s ease-in-out infinite;
    }

    @keyframes load {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* Leaflet */
    .leaflet-control-zoom {
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
    }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
      font-weight: 600 !important;
    }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <div class="load-icon">🐗</div>
  <h2>LD DRAVINJA MAJŠPERK</h2>
  <p>Nalaganje zemljevida...</p>
  <div class="load-bar"><div class="load-bar-inner"></div></div>
</div>

<!-- ALERT: OUTSIDE BOUNDARY -->
<div id="alert-overlay">
  <div class="alert-icon">⚠️</div>
  <h2>Zunaj lovišča!</h2>
  <p>Zapustil si meje lovišča LD Majšperk 258.</p>
  <button id="btn-dismiss" onclick="dismissAlert()">Razumem</button>
</div>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <div id="header-icon">🐗</div>
    <div id="header-text">
      <h1>LD DRAVINJA MAJŠPERK</h1>
      <p>Meja lovišča</p>
    </div>
  </div>
  <div id="status-badge">
    <div id="gps-status">
      <div id="gps-dot"></div>
      <span id="gps-text">Čakam GPS...</span>
    </div>
    <div id="boundary-status" class="unknown">NEZNAN POLOŽAJ</div>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <div class="info-block">
    <span class="info-label">Širina</span>
    <span class="info-value" id="lat-display">—</span>
  </div>
  <div class="info-block">
    <span class="info-label">Dolžina</span>
    <span class="info-value" id="lng-display">—</span>
  </div>
  <button id="btn-center" onclick="centerOnMe()" title="Moja lokacija">📍</button>
  <button id="btn-map-toggle" onclick="toggleMap()" title="Zamenjaj mapo">🛰️</button>
  <div class="info-block">
    <span class="info-label">Natančnost</span>
    <span class="info-value" id="acc-display">—</span>
  </div>
  <div class="info-block">
    <span class="info-label">Nadm. viš.</span>
    <span class="info-value" id="alt-display">—</span>
  </div>
</div>

<script>
// ============================================================
// MEJA LOVIŠČA LD MAJŠPERK 258
// Koordinate določene iz uradne lovske mape
// Format: [latitude, longitude]
// ============================================================
const BOUNDARY_COORDS = [
  [46.4010, 15.7050],  // SZ kot - pri Kidričevem
  [46.4020, 15.7300],
  [46.4015, 15.7500],
  [46.4005, 15.7650],
  [46.3990, 15.7850],  // Sever - Kidričevo območje
  [46.3970, 15.8000],
  [46.3950, 15.8100],
  [46.3920, 15.8150],  // SV - Apače
  [46.3880, 15.8120],
  [46.3850, 15.8050],
  [46.3820, 15.7980],
  [46.3800, 15.7900],  // Vzhod - Zg. Pristava
  [46.3780, 15.7850],
  [46.3760, 15.7900],
  [46.3740, 15.7950],
  [46.3720, 15.7980],
  [46.3700, 15.7950],  // JV - Janski Vrh
  [46.3680, 15.7900],
  [46.3650, 15.7820],
  [46.3620, 15.7750],
  [46.3600, 15.7700],  // Jug - Kočice
  [46.3570, 15.7650],
  [46.3540, 15.7600],
  [46.3510, 15.7500],
  [46.3490, 15.7400],  // JZ - Stari Grad
  [46.3480, 15.7300],
  [46.3490, 15.7150],
  [46.3510, 15.7000],
  [46.3530, 15.6900],  // Zahod - Makole
  [46.3560, 15.6800],
  [46.3590, 15.6750],
  [46.3620, 15.6720],
  [46.3650, 15.6700],  // SZ - Pečke
  [46.3690, 15.6720],
  [46.3720, 15.6780],
  [46.3750, 15.6850],
  [46.3780, 15.6900],  // Zahod sredina
  [46.3810, 15.6950],
  [46.3840, 15.6980],
  [46.3870, 15.7000],
  [46.3910, 15.7020],  // SZ - Plagersko
  [46.3950, 15.7030],
  [46.3980, 15.7040],
  [46.4010, 15.7050],  // Zaključek - nazaj na začetek
];

// ============================================================
// TOČKA V POLIGONU - algoritem
// ============================================================
function pointInPolygon(lat, lng, polygon) {
  let inside = false;
  const n = polygon.length;
  let j = n - 1;
  for (let i = 0; i < n; i++) {
    const xi = polygon[i][1], yi = polygon[i][0];
    const xj = polygon[j][1], yj = polygon[j][0];
    const intersect = ((yi > lat) !== (yj > lat)) &&
      (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
    j = i;
  }
  return inside;
}

// ============================================================
// MAP SETUP
// ============================================================
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false,
  preferCanvas: true,
  zoomAnimation: true,
  fadeAnimation: true,
  markerZoomAnimation: true,
});

// MapTiler satelit - hiter, smooth
const MAPTILER_KEY = '8MprynDQ4qJMQcD3R5X2';

L.tileLayer(`https://api.maptiler.com/tiles/satellite-v2/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`, {
  maxZoom: 20,
  minZoom: 8,
  attribution: '© MapTiler',
  keepBuffer: 6,
  updateWhenIdle: false,
  updateWhenZooming: false,
  crossOrigin: true,
}).addTo(map);

// Začetni pogled - center Majšperka
map.setView([46.3740, 15.7350], 12);

// Nariši mejo lovišča
const boundaryPolygon = L.polygon(BOUNDARY_COORDS, {
  color: '#4a9fd4',
  weight: 3,
  opacity: 0.9,
  fillColor: '#4a9fd4',
  fillOpacity: 0.08,
  dashArray: '8, 4',
}).addTo(map);

boundaryPolygon.bindPopup('<b>🌲 LD Majšperk 258</b><br>Meja lovišča');

// ============================================================
// GPS MARKER
// ============================================================
const playerIcon = L.divIcon({
  html: `<div id="player-arrow" style="
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 24px solid #f5a623;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    transform-origin: center 16px;
  "></div>`,
  className: '',
  iconSize: [20, 24],
  iconAnchor: [10, 16],
});

// Kompas - obrača trikotnik glede na smer telefona
let currentHeading = 0;

function updateHeading(event) {
  let heading = 0;
  if (event.webkitCompassHeading !== undefined) {
    // iOS
    heading = event.webkitCompassHeading;
  } else if (event.alpha !== null) {
    // Android
    heading = 360 - event.alpha;
  }
  currentHeading = heading;
  const arrow = document.getElementById('player-arrow');
  if (arrow) arrow.style.transform = `rotate(${heading}deg)`;
}

// Zahteva dovoljenje za kompas (iOS 13+)
function startCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === 'granted') {
          window.addEventListener('deviceorientation', updateHeading, true);
        }
      }).catch(console.error);
  } else {
    window.addEventListener('deviceorientation', updateHeading, true);
  }
}

startCompass();

let playerMarker = null;
let accuracyCircle = null;
let isFollowing = true;
let lastPosition = null;
let wasOutside = false;

map.on('dragstart', () => { isFollowing = false; });

// ============================================================
// GPS TRACKING
// ============================================================
function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = pos.coords.accuracy;
  const alt = pos.coords.altitude;

  lastPosition = { lat, lng, acc, alt };

  // Update marker
  if (!playerMarker) {
    playerMarker = L.marker([lat, lng], { icon: playerIcon }).addTo(map);
    playerMarker.bindPopup('📍 Moja lokacija');
  } else {
    playerMarker.setLatLng([lat, lng]);
  }

  // Accuracy circle
  if (accuracyCircle) accuracyCircle.remove();
  accuracyCircle = L.circle([lat, lng], {
    radius: acc,
    color: '#f5a623',
    fillColor: '#f5a623',
    fillOpacity: 0.08,
    weight: 1,
  }).addTo(map);

  // Follow
  if (isFollowing) map.setView([lat, lng]);

  // Update UI
  document.getElementById('gps-dot').className = 'active';
  document.getElementById('gps-text').textContent = 'GPS aktiven';
  document.getElementById('lat-display').textContent = lat.toFixed(5);
  document.getElementById('lng-display').textContent = lng.toFixed(5);
  document.getElementById('acc-display').textContent = `±${Math.round(acc)}m`;
  document.getElementById('alt-display').textContent = alt ? `${Math.round(alt)}m` : '—';

  // Check boundary
  const inside = pointInPolygon(lat, lng, BOUNDARY_COORDS);
  const bs = document.getElementById('boundary-status');

  if (inside) {
    bs.textContent = '✓ V LOVIŠČU';
    bs.className = 'inside';
    wasOutside = false;
  } else {
    bs.textContent = '⚠ ZUNAJ MEJE';
    bs.className = 'outside';
    if (!wasOutside) {
      wasOutside = true;
      showAlert();
    }
  }
}

function onError(err) {
  document.getElementById('gps-dot').className = 'error';
  document.getElementById('gps-text').textContent = 'GPS napaka';
  console.warn('GPS error:', err.message);
}

// Start GPS
if ('geolocation' in navigator) {
  navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 2000,
  });
} else {
  document.getElementById('gps-text').textContent = 'GPS ni podprt';
  document.getElementById('gps-dot').className = 'error';
}

// ============================================================
// FUNCTIONS
// ============================================================
// ============================================================
// MAP TOGGLE
// ============================================================
let isSatellite = true;

const satelliteLayer = L.tileLayer(`https://api.maptiler.com/tiles/satellite-v2/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`, {
  maxZoom: 20, minZoom: 8, keepBuffer: 6, crossOrigin: true,
  updateWhenIdle: false, updateWhenZooming: false,
});

const normalLayer = L.tileLayer(`https://api.maptiler.com/maps/outdoor-v2/{z}/{x}/{y}.png?key=${MAPTILER_KEY}`, {
  maxZoom: 20, minZoom: 8, keepBuffer: 6, crossOrigin: true,
  updateWhenIdle: false, updateWhenZooming: false,
});

function toggleMap() {
  if (isSatellite) {
    map.eachLayer(layer => { if (layer instanceof L.TileLayer) map.removeLayer(layer); });
    normalLayer.addTo(map);
    document.getElementById('btn-map-toggle').textContent = '🛰️';
    isSatellite = false;
  } else {
    map.eachLayer(layer => { if (layer instanceof L.TileLayer) map.removeLayer(layer); });
    satelliteLayer.addTo(map);
    document.getElementById('btn-map-toggle').textContent = '🗺️';
    isSatellite = true;
  }
  boundaryPolygon.bringToFront();
  if (playerMarker) playerMarker.bringToFront();
}
function centerOnMe() {
  isFollowing = true;
  if (lastPosition) {
    map.setView([lastPosition.lat, lastPosition.lng], 15);
  }
}

function showAlert() {
  document.getElementById('alert-overlay').classList.add('show');
  // Vibrate if supported
  if ('vibrate' in navigator) navigator.vibrate([500, 200, 500, 200, 500]);
}

function dismissAlert() {
  document.getElementById('alert-overlay').classList.remove('show');
}

// ============================================================
// HIDE LOADING
// ============================================================
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
  }, 1800);
});
</script>
</body>
</html>
